# tpcds.conf — tpcds extension configuration
# Edit this file or use: SELECT tpcds.config('key', 'value');

# ------- Paths (empty = auto-detect) -------

# Root directory containing dsdgen/dsqgen binaries and tpcds.idx
# Default: {SHAREDIR}/extension/tpcds_dsgen
# tpcds_dir =

# Base directory for generated .dat files on each segment host
# Default: {segment_datadir}/dsgendata_tpcds (one subdir per segment datadir)
# data_dir =

# Directory for generated SQL query files (dsqgen output)
# Default: {SHAREDIR}/extension/tpcds_query
# query_dir =

# Directory for benchmark result CSV files (one per run)
# Default: {SHAREDIR}/extension/tpcds_results
# results_dir =

# Temp directory for load scripts, gpfdist logs, and intermediate files
# Default: {PGDATA}/tpcds_tmp (coordinator), {segment_datadir}/tpcds_tmp (segments)
# tmp_dir =

# ------- Schema -------
# use_partition = false
storage_type = aocs

# ------- Data generation -------
scale_factor = 1
parallel = 2

# ------- Loading -------
workers = 4
# gpfdist_base_port =

# ------- Benchmark -------
# optimizer =
# timeout_sec =
